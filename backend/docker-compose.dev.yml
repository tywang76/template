version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder  # Use builder stage which has all dependencies
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: mongodb://mongo:27017/roadtrix?replicaSet=rs0
      NODE_ENV: development
      PORT: "3000"
    volumes:
      # Mount source code for hot reload
      - ./src:/app/src
      - ./openapi.json:/app/openapi.json
      - ./tsconfig.json:/app/tsconfig.json
      - ./prisma:/app/prisma
      - ./nodemon.json:/app/nodemon.json
      # Use named volume for node_modules to avoid overwriting
      - node_modules:/app/node_modules
    command: npm run dev
    depends_on:
      - mongo

  mongo:
    image: mongo:4.4.6
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - ./data/mongodb:/data/db
    command: ["--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}) }" | mongo --quiet
      interval: 5s
      timeout: 30s
      start_period: 0s
      start_interval: 1s
      retries: 30

volumes:
  node_modules:
